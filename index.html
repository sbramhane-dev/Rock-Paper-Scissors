<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors-game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="wholepage">
   <header> 
    <h1 class="head">~Rock~Paper~Scissors~</h1>
</header>
   <main id="container">
    <div id="rock" class="option">
    </div>
    <div id="paper" class="option">
    </div>
    <div id="scissors" class="option">
    </div>
   </main>
   <footer>
 <div id="scores">
       <div id="user"> <p class="pname">Your-score :</p>
        <p id="userscore">0</p></div>
  
       <div id="comp"><p class="pname">Computer-score :</p>
        <p id="compscore">0</p></div>
    </div>
    <div class="startgame">Play your move!</div>
    <div class="restart">Restart Game?</div>
   </footer>
   <script src="sc.js"></script>
</body>
</html>
